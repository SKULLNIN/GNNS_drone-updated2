# ============================================================
# gNNS Drone — Flight Controller Gains & Parameters
# ============================================================
# COMPETITION PROFILE: GPS-denied, 5 waypoints, 1000 m range,
# 15 min flight time, camera/LiDAR/IMU only.
#
# TUNED FROM autonomy_core SO3 controller gains:
#   pos: {x: 4.0, y: 4.0, z: 4.0}
#   vel: {x: 3.5, y: 3.5, z: 3.5}
#   stopping_policy: acc_xy=6.0, jerk_xy=3.0
#   trajectory_planner: max_v=3.0, max_a=4.0, max_j=2.0
#
# NOTE ON VIO DRIFT:
#   Without GPS and without loop closures (5 separate destinations),
#   RTAB-Map/ORB-SLAM3 accumulates scale drift over distance.
#   Over 1000 m total, expect 5–20 m position error at final waypoints.
#   Mitigations: conservative speed, good lighting, textured ground.
# ============================================================

# ============================================================
# Position → Velocity PID Gains
# ============================================================
position_gains:
  # Horizontal (North-East plane)
  # autonomy_core: pos_kp=4.0, vel_kp=3.5
  # Our mapping: kp=0.6 gives ~3m/s at 5m error (good)
  horizontal:
    kp: 0.60       # Smooth proportional (autonomy_core style)
    ki: 0.01       # Tiny integral for steady-state
    kd: 0.25       # Moderate damping (anti-overshoot)
    max_integral: 0.5

  # Vertical (altitude hold)
  vertical:
    kp: 0.7
    ki: 0.02
    kd: 0.3
    max_integral: 0.3

# ============================================================
# Velocity Limits (m/s)
# autonomy_core: max_v=3.0, max_v_z=1.5
# We boost horizontal for competition
# ============================================================
velocity_limits:
  # COMPETITION: Need ~5 m/s to cover 1000 m in 15 min (including 5 landings + RTH).
  # Raise only if VIO tracking remains stable during test flights.
  cruise_max: 4.0        # 4 m/s = 240 m/min (conservative for 1000 m missions)
  approach_max: 1.5      # Slow down near waypoint for landing accuracy
  landing_horizontal: 0.3
  landing_final: 0.15
  ascent_max: 1.5        # Climb fast to cruise altitude
  descent_max: 1.5       # Descend fast between waypoints
  descent_landing: 0.2
  descent_final: 0.1

# ============================================================
# Acceleration Limits (m/s²)
# autonomy_core stopping_policy: acc_xy=6.0, jerk_xy=3.0
# We use 2.5 for smooth velocity ramps
# ============================================================
acceleration_limits:
  horizontal: 2.5        # Smooth ramp (no jerk)
  vertical: 2.0
  landing: 0.5

# ============================================================
# Waypoint Navigation
# autonomy_core: tol_pos=3.0, final_goal_reach=7.0
# ============================================================
waypoint:
  cruise_altitude: 3.0   # Slightly higher for obstacle clearance at 4 m/s
  arrival_radius: 2.5    # Land within 2.5 m of target (VIO drift limited)
  slowdown_radius: 12.0  # Start decelerating 12 m out (smooth at 4 m/s)
  heading_mode: "auto"

# ============================================================
# Takeoff Parameters
# ============================================================
takeoff:
  target_altitude: 2.5
  vertical_speed: 0.8
  stabilize_time: 3.0
  ramp_up_time: 2.0
  arm_delay: 1.0

# ============================================================
# Landing Parameters
# ============================================================
landing:
  approach_altitude: 3.0
  align_start_altitude: 3.0
  final_start_altitude: 1.0
  touchdown_altitude: 0.15

  approach_speed: 0.6
  align_descent_rate: 0.2
  final_descent_rate: 0.1

  align_center_tolerance: 0.5
  final_center_tolerance: 0.3

  # Landing PID — tighter, more damped
  align_gains:
    kp: 0.5
    ki: 0.0
    kd: 0.3
  final_gains:
    kp: 0.3
    ki: 0.0
    kd: 0.4

  search_timeout: 30.0
  search_spiral_rate: 0.5
  search_max_radius: 3.0

  target_lost_align_timeout: 10.0
  target_lost_final_timeout: 5.0

  max_landing_time: 60.0
  max_tilt_deg: 15.0

# ============================================================
# PID filtering (D-term EMA, position pre-filter before PID)
# ============================================================
filtering:
  d_term_alpha: 0.5      # Higher = faster D-term response (tune with control-loop Hz)
  position_alpha: 0.4    # EMA on raw N/E/alt before error (VIO noise rejection)

# ============================================================
# Safety & Geofence
# ============================================================
safety:
  # COMPETITION: Must exceed 1000 m. Set to 1500 m for margin.
  geofence_radius: 1500.0
  # 15 min flight at 4 m/s cruise ≈ 3600 m range. 15% battery buffer.
  min_battery_pct: 15.0
  # Stay below competition altitude limit (check rules; 20 m is safe).
  max_altitude: 20.0
  min_odom_confidence: 30
  vio_lost_action: "LAND"
